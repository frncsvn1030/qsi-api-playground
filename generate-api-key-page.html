<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate API Key</title>

    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.16.15/dist/css/uikit.min.css" />
    <link rel="stylesheet" href="/css/style.css">

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.16.15/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.16.15/dist/js/uikit-icons.min.js"></script>
    
    <script src="/js/password-toggle.js" defer></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
</head>
<body>
    <!------------------------- Header ---------------------------->
    <header class="uk-flex uk-flex-middle">
        <nav class="container-custom">
            <a href="#">
                <div class="nav-logo">
                    <img src="/images/logos/qx-logo.png">
                </div>
            </a>

            <div class="nav-links">
                <a class="nav-link" href="#">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 10.5L12 3l9 7.5"></path>
                        <path d="M5 10v10h14V10"></path>
                        <path d="M9 21v-6h6v6"></path>
                    </svg>
                    <span>Home</span>
                </a>
                <a class="nav-link" href="#invite-modal" uk-toggle>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    <span>Send Invite</span>
                </a>
                <a class="nav-link" href="./api-endpoint.html" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="4" width="6" height="6" rx="1"></rect>
                        <rect x="14" y="4" width="6" height="6" rx="1"></rect>
                        <rect x="9" y="14" width="6" height="6" rx="1"></rect>

                        <path d="M10 7h4"></path>
                        <path d="M12 10v4"></path>
                    </svg>
                    <span>API</span>
                </a>
                <a class="nav-link sign-in" href="#signin-modal" uk-toggle>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21a8 8 0 0 0-16 0"></path>
                        <circle cx="12" cy="8" r="4"></circle>
                    </svg>
                    <span>Sign in</span>
                </a>
            </div>
        </nav>
    </header>

    <!------------------------- Content ---------------------------->
    <section class="uk-flex uk-flex-middle uk-padding" uk-height-viewport="offset-top: true;">
        <div class="container-custom uk-flex uk-flex-center">
            <div class="uk-width-large@m">

                <!-- 1 -->
                <div class="card uk-width-medium uk-margin-auto">
                    <div class="card-logo"><img src="/images/logos/qx-logo.png" alt="Logo"/></div>
                    <h3 class="card-title">QSI Open API</h3>

                    <div class="form-actions uk-child-width-expand">
                        <button class="uk-button button button--primary" type="submit">Generate API Keys</button>
                    </div>
                </div>

                <!-- 2 -->
                <div class="card" hidden>
                    <div class="card-logo"><img src="/images/logos/qx-logo.png" alt="Logo"/></div>
                    <h3 class="card-title">Generate API Key</h3>

                    <form class="form">
                        <div class="form-section">
                            <div class="form-input">
                                <label>
                                    Application/ API Key Name <!-- <span class="required">*</span> -->
                                </label>
                                <div class="form-control">
                                    <input class="uk-input input" type="email" placeholder="Application/ API Key Name"/>
                                    <span class="form-validation">Validation text here.</span>
                                </div>
                            </div>
                            <div class="form-input">
                                <label>
                                    Environment <!-- <span class="required">*</span> -->
                                </label>
                                <div class="form-control">
                                    <select class="uk-select select">
                                        <option value="" disabled selected>Select an option</option>
                                        <option value="Staging">Staging</option>
                                        <option value="Production">Production</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions uk-child-width-expand">
                            <button class="uk-button button button--primary" type="submit">Create Key</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </section>
</body>
</html>
